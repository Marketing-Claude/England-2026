<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="England 2026">
<title>England 2026 — Wheels Up</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .logo-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 1.5rem;
  }

  .merc-star { width: 44px; height: 44px; }

  .top-label {
    color: #00D2BE;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  .race-name {
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    margin: 0.5rem 0 0.25rem;
    line-height: 1.2;
  }

  .race-name span { color: #00D2BE; }

  .destination {
    color: #555;
    font-size: 9px;
    letter-spacing: 3px;
    margin-bottom: 2rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }

  .unit {
    background: #141414;
    border: 1px solid #00D2BE44;
    border-radius: 10px;
    padding: 1.2rem 0.5rem 1rem;
    position: relative;
    overflow: hidden;
  }

  .unit::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: #00D2BE;
  }

  .unit-num {
    color: #00D2BE;
    font-size: clamp(28px, 9vw, 42px);
    font-weight: 900;
    line-height: 1;
    display: block;
  }

  .unit-label {
    color: #555;
    font-size: 8px;
    letter-spacing: 2px;
    margin-top: 8px;
    display: block;
    text-transform: uppercase;
  }

  .progress-wrap { margin-bottom: 1.5rem; }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    color: #444;
    font-size: 8px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .progress-bar {
    background: #1a1a1a;
    border-radius: 3px;
    height: 4px;
    overflow: hidden;
  }

  .progress-fill {
    background: #00D2BE;
    height: 100%;
    border-radius: 3px;
    transition: width 1s linear;
  }

  .milestones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .milestone {
    background: #141414;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 0.75rem;
    text-align: left;
  }

  .ms-label {
    color: #444;
    font-size: 7px;
    letter-spacing: 2px;
    display: block;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .ms-val {
    color: #00D2BE;
    font-size: 11px;
    font-weight: 700;
    display: block;
    line-height: 1.3;
  }

  .flag-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1rem;
  }

  .fd {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .f-s { background: #C0C0C0; }
  .f-t { background: #00D2BE; }
  .f-b { background: #222; border: 1px solid #444; }

  .footer {
    color: #333;
    font-size: 7px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo-bar">
    <svg class="merc-star" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#00D2BE" stroke-width="1.5"/>
      <line x1="20" y1="2" x2="20" y2="20" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="34" y2="31" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="6" y2="31" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="3" fill="#00D2BE"/>
    </svg>
    <div class="top-label">Almond Family<br>England 2026</div>
    <svg class="merc-star" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#00D2BE" stroke-width="1.5"/>
      <line x1="20" y1="2" x2="20" y2="20" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="34" y2="31" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="6" y2="31" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="3" fill="#00D2BE"/>
    </svg>
  </div>

  <div class="race-name">WHEELS UP</div>
  <div class="race-name"><span>27 JUNE 2026</span></div>
  <div class="destination">Newcastle Airport · 10:05am</div>

  <div class="grid">
    <div class="unit"><span class="unit-num" id="days">--</span><span class="unit-label">Days</span></div>
    <div class="unit"><span class="unit-num" id="hours">--</span><span class="unit-label">Hours</span></div>
    <div class="unit"><span class="unit-num" id="mins">--</span><span class="unit-label">Mins</span></div>
    <div class="unit"><span class="unit-num" id="secs">--</span><span class="unit-label">Secs</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels"><span>Planning started</span><span>Wheels up</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  </div>

  <div class="milestones">
    <div class="milestone">
      <span class="ms-label">London arrival</span>
      <span class="ms-val">Sun 28 Jun</span>
    </div>
    <div class="milestone">
      <span class="ms-label">British Grand Prix</span>
      <span class="ms-val">Thu 3 Jul</span>
    </div>
    <div class="milestone">
      <span class="ms-label">Red Bull factory</span>
      <span class="ms-val">Mon 6 Jul</span>
    </div>
    <div class="milestone">
      <span class="ms-label">Home</span>
      <span class="ms-val">Fri 17 Jul</span>
    </div>
  </div>

  <div class="flag-row">
    <div class="fd f-s"></div><div class="fd f-t"></div>
    <div class="fd f-s"></div><div class="fd f-b"></div>
    <div class="fd f-s"></div><div class="fd f-t"></div>
    <div class="fd f-s"></div><div class="fd f-b"></div>
    <div class="fd f-s"></div><div class="fd f-t"></div>
    <div class="fd f-s"></div><div class="fd f-b"></div>
  </div>

  <div class="footer">Jodie · Wayne · Ruby · Maverick</div>
</div>

<script>
  const target = new Date('2026-06-27T10:05:00+10:00');
  const start = new Date('2025-09-01T00:00:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  function update() {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('mins').textContent = '00';
      document.getElementById('secs').textContent = '00';
      document.getElementById('prog').style.width = '100%';
      return;
    }

    document.getElementById('days').textContent  = pad(Math.floor(diff / 86400000));
    document.getElementById('hours').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('mins').textContent  = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('secs').textContent  = pad(Math.floor((diff % 60000) / 1000));

    const total = target - start;
    const elapsed = now - start;
    const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
    document.getElementById('prog').style.width = pct.toFixed(2) + '%';
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
